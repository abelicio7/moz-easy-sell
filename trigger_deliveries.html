<!DOCTYPE html>
<html>
<head>
    <title>Disparar Entregas EnsinaPay</title>
    <style>
        body { font-family: sans-serif; padding: 50px; background: #0a0a0b; color: white; text-align: center; }
        button { background: #10b981; border: none; color: black; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 10px; }
        .card { background: #141416; padding: 30px; border-radius: 20px; border: 1px solid #232326; max-width: 500px; margin: 0 auto; }
        pre { background: #000; padding: 10px; border-radius: 5px; color: #10b981; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚀 Disparar Entregas Pendentes</h2>
        <p>Clica no botão abaixo para enviar os e-mails de entrega agora.</p>
        <button onclick="triggerAll()">ENVIAR E-MAILS AGORA</button>
        <div id="log"></div>
    </div>

    <script>
        const emails = ['salomao.chamusse@gmail.com', 'ilidioxaviar@gmail.com'];
        const SUPABASE_URL = "https://ekprysxfgkafpwjbocab.supabase.co";
        const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrcHJ5c3hmZ2thZnB3amJvY2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTA3MTQsImV4cCI6MjA5MTkyNjcxNH0.vGMD8DxQ9b6A9jU9ScUhnSiR6JQThuyEvedSxMz2eQE";

        async function triggerAll() {
            const log = document.getElementById('log');
            log.innerHTML = "A iniciar envio...<br>";
            
            for (const email of emails) {
                log.innerHTML += `A processar: ${email}... `;
                try {
                    // 1. Get Order ID
                    const resp = await fetch(`${SUPABASE_URL}/rest/v1/orders?customer_email=eq.${email}&status=eq.paid&select=id`, {
                        headers: { "apikey": ANON_KEY, "Authorization": `Bearer ${ANON_KEY}` }
                    });
                    const orders = await resp.json();
                    
                    if (orders.length > 0) {
                        const orderId = orders[0].id;
                        // 2. Trigger Delivery
                        const delResp = await fetch(`${SUPABASE_URL}/functions/v1/process-order-delivery`, {
                            method: 'POST',
                            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${ANON_KEY}` },
                            body: JSON.stringify({ id: orderId })
                        });
                        if (delResp.ok) log.innerHTML += "✅ SUCESSO!<br>";
                        else log.innerHTML += "❌ FALHOU (Erro Function)<br>";
                    } else {
                        log.innerHTML += "❓ Pedido 'paid' não encontrado.<br>";
                    }
                } catch (e) {
                    log.innerHTML += `❌ ERRO: ${e.message}<br>`;
                }
            }
            log.innerHTML += "<br><b>Processo Concluído!</b>";
        }
    </script>
</body>
</html>
